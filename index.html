<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audioguía</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0d0b;
    --surface: #181714;
    --surface2: #222018;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #f0ead8;
    --text-muted: #8a8270;
    --text-dim: #4a4640;
    --radius: 12px;
    --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px 48px;
    position: relative;
    overflow-x: hidden;
  }

  /* Fondo decorativo */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 0%, rgba(201,168,76,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  /* Cabecera */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.7s ease both;
  }

  .header .ornament {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 8vw, 52px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.5px;
    color: var(--text);
    margin-bottom: 12px;
  }

  .header h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .header .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--text-dim));
  }
  .divider::after {
    background: linear-gradient(to left, transparent, var(--text-dim));
  }
  .divider span {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    opacity: 0.6;
  }

  /* Selector de idioma */
  .lang-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 16px;
    animation: fadeUp 0.7s 0.15s ease both;
  }

  .lang-selector {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 32px;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .lang-btn {
    background: var(--surface);
    border: 1px solid var(--text-dim);
    color: var(--text-muted);
    border-radius: var(--radius);
    padding: 18px 10px;
    cursor: pointer;
    transition: var(--transition);
    text-align: center;
    -webkit-tap-highlight-color: transparent;
  }

  .lang-btn:hover {
    border-color: var(--gold);
    color: var(--text);
    background: var(--surface2);
  }

  .lang-btn.active {
    border-color: var(--gold);
    background: var(--gold-dim);
    color: var(--gold-light);
  }

  .lang-btn .flag {
    font-size: 26px;
    display: block;
    margin-bottom: 6px;
    line-height: 1;
  }

  .lang-btn .lang-name {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.3px;
    display: block;
  }

  .lang-btn .lang-native {
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.6;
    display: block;
    margin-top: 2px;
  }

  /* Reproductor */
  .player-wrapper {
    animation: fadeUp 0.7s 0.28s ease both;
  }

  .player-card {
    background: var(--surface);
    border: 1px solid var(--text-dim);
    border-radius: 16px;
    padding: 28px 24px;
    position: relative;
    overflow: hidden;
    transition: var(--transition);
  }

  .player-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    opacity: 0.4;
  }

  .track-info {
    margin-bottom: 22px;
  }

  .track-info .track-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.3;
    min-height: 30px;
  }

  .track-info .track-desc {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    min-height: 18px;
  }

  /* Barra de progreso */
  .progress-area {
    margin-bottom: 10px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--text-dim);
    border-radius: 99px;
    cursor: pointer;
    position: relative;
    margin-bottom: 8px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold), var(--gold-light));
    border-radius: 99px;
    width: 0%;
    transition: width 0.3s linear;
    pointer-events: none;
  }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  /* Controles */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px;
    border-radius: 50%;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }

  .ctrl-btn:hover { color: var(--text); }

  .ctrl-btn.play-btn {
    width: 56px;
    height: 56px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 50%;
    box-shadow: 0 0 24px rgba(201,168,76,0.25);
    transition: var(--transition);
  }

  .ctrl-btn.play-btn:hover {
    background: var(--gold-light);
    transform: scale(1.05);
    box-shadow: 0 0 32px rgba(201,168,76,0.4);
  }

  .ctrl-btn.play-btn:active { transform: scale(0.97); }

  .ctrl-btn svg { display: block; }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid var(--text-dim);
  }

  .volume-row svg { color: var(--text-muted); flex-shrink: 0; }

  .volume-row input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--text-dim);
    border-radius: 99px;
    outline: none;
    cursor: pointer;
  }

  .volume-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    transition: transform 0.2s;
  }

  .volume-row input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* Nota de uso */
  .note {
    margin-top: 28px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    animation: fadeUp 0.7s 0.35s ease both;
  }

  .note a { color: var(--text-muted); text-decoration: none; }
  .note a:hover { color: var(--gold); }

  /* Estado sin idioma seleccionado */
  .player-card.disabled {
    opacity: 0.45;
    pointer-events: none;
  }

  .select-prompt {
    text-align: center;
    padding: 10px 0 4px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    animation: fadeUp 0.7s 0.28s ease both;
    margin-bottom: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <p class="ornament">✦ Bienvenido · Welcome · Bienvenue ✦</p>
    <h1>Audio<em>guía</em></h1>
    <p class="subtitle">Nombre de la exposición · 2025</p>
  </div>

  <div class="divider"><span>◆</span></div>

  <p class="lang-label">Elige tu idioma · Choose your language</p>

  <div class="lang-selector">
    <button class="lang-btn" data-lang="es" onclick="selectLang(this)">
      <span class="flag">🇪🇸</span>
      <span class="lang-name">Español</span>
      <span class="lang-native">ES</span>
    </button>
    <button class="lang-btn" data-lang="en" onclick="selectLang(this)">
      <span class="flag">🇬🇧</span>
      <span class="lang-name">English</span>
      <span class="lang-native">EN</span>
    </button>
    <button class="lang-btn" data-lang="fr" onclick="selectLang(this)">
      <span class="flag">🇫🇷</span>
      <span class="lang-name">Français</span>
      <span class="lang-native">FR</span>
    </button>
  </div>

  <p class="select-prompt" id="select-prompt">↑ Selecciona un idioma para comenzar</p>

  <div class="player-wrapper">
    <div class="player-card disabled" id="player-card">

      <div class="track-info">
        <div class="track-title" id="track-title">—</div>
        <div class="track-desc" id="track-desc">Selecciona un idioma</div>
      </div>

      <div class="progress-area">
        <div class="progress-bar-wrap" id="progress-wrap" onclick="seekAudio(event)">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="time-row">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" onclick="skip(-15)" title="−15s">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
            <text x="6" y="20" style="font:bold 6px sans-serif;fill:currentColor;stroke:none">15</text>
          </svg>
        </button>

        <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()">
          <svg id="icon-play" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          <svg id="icon-pause" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>

        <button class="ctrl-btn" onclick="skip(15)" title="+15s">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-3.5"/>
            <text x="6" y="20" style="font:bold 6px sans-serif;fill:currentColor;stroke:none">15</text>
          </svg>
        </button>
      </div>

      <div class="volume-row">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        </svg>
        <input type="range" min="0" max="1" step="0.05" value="1" id="volume-slider" oninput="setVolume(this.value)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </div>

    </div>
  </div>

  <p class="note">
    Usa auriculares para una mejor experiencia.<br>
    <a href="#">Más información sobre la exposición</a>
  </p>

</div>

<audio id="audio-player"></audio>

<script>
// ─── CONFIGURACIÓN ──────────────────────────────────────────────
// Sustituye las URLs por los enlaces directos a tus audios.
// Para Google Drive: comparte el archivo como "Cualquiera con el enlace"
// y usa: https://drive.google.com/uc?export=download&id=TU_ID_DE_ARCHIVO
// Para Archive.org: usa la URL directa del .mp3

const TRACKS = {
  es: {
    title: "Audioguía en español",
    desc:  "Narración completa de la exposición",
    src:   "https://www.dropbox.com/scl/fi/vwqsj6le5hih1gmbkqisf/ES_F_Marina_Audioguide_ES.mp3?rlkey=6julyvw76ph8s6ztfzv3s9b1k&st=andfshdl&raw=1"
  },
  en: {
    title: "Audio guide in English",
    desc:  "Complete exhibition narration",
    src:   "https://www.dropbox.com/scl/fi/vwqsj6le5hih1gmbkqisf/ES_F_Marina_Audioguide_ES.mp3?rlkey=6julyvw76ph8s6ztfzv3s9b1k&st=andfshdl&raw=1"
  },
  fr: {
    title: "Audioguide en français",
    desc:  "Narration complète de l'exposition",
    src:   "https://www.dropbox.com/scl/fi/vwqsj6le5hih1gmbkqisf/ES_F_Marina_Audioguide_ES.mp3?rlkey=6julyvw76ph8s6ztfzv3s9b1k&st=andfshdl&raw=1"
  }
};
// ────────────────────────────────────────────────────────────────

const audio    = document.getElementById('audio-player');
const card     = document.getElementById('player-card');
const prompt   = document.getElementById('select-prompt');
let currentLang = null;

function selectLang(btn) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const lang = btn.dataset.lang;
  const track = TRACKS[lang];
  currentLang = lang;

  document.getElementById('track-title').textContent = track.title;
  document.getElementById('track-desc').textContent  = track.desc;

  audio.src = track.src;
  audio.load();

  card.classList.remove('disabled');
  prompt.style.display = 'none';

  setPlayIcon(false);
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('time-total').textContent   = '0:00';
}

function togglePlay() {
  if (!currentLang) return;
  if (audio.paused) {
    audio.play();
    setPlayIcon(true);
  } else {
    audio.pause();
    setPlayIcon(false);
  }
}

function setPlayIcon(playing) {
  document.getElementById('icon-play').style.display  = playing ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
}

function skip(sec) {
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}

function setVolume(v) {
  audio.volume = v;
}

function seekAudio(e) {
  if (!audio.duration) return;
  const rect = document.getElementById('progress-wrap').getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent  = fmt(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  document.getElementById('time-total').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => setPlayIcon(false));

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}
</script>

</body>
</html>
